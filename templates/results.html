{% extends "base.html" %}
<!-- 结果页：展示统计摘要、趋势图和学生样本明细。 -->
{% block title %}结果界面 - 食堂就餐仿真平台{% endblock %}
{% block content %}
<section class="card">
    <div class="section-head">
        <h2>结果界面</h2>
        <p>查看统计指标与图表结果。</p>
    </div>
    <div id="summary-grid" class="stats-grid"></div>
    <div class="results-layout">
        <div class="chart-wrap"><canvas id="result-chart"></canvas></div>
        <div class="chart-wrap"><canvas id="window-chart"></canvas></div>
    </div>
    <div class="subcard">
        <h3>仿真摘要</h3>
        <table class="data-table" id="student-table">
            <thead>
                <tr>
                    <th>学生ID</th>
                    <th>到达时间</th>
                    <th>窗口</th>
                    <th>桌号</th>
                    <th>状态</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</section>
{% endblock %}
{% block scripts %}
<script>window.SIMULATION_ID = "{{ simulation_id }}";</script>
<script src="{{ url_for('static', filename='js/results.js') }}"></script>
{% endblock %}
